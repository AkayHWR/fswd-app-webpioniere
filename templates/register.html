{% extends "base.html" %}

{% block title %}Registrierung{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="card-title mb-4 text-center">
                    Registrierung bei StudySwap
                </h2>

```
            {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">
                        HWR-E-Mail
                    </label>

                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        placeholder="dein.name@stud.hwr-berlin.de"
                        autocomplete="email"
                        required
                        autofocus
                    >

                    <small class="text-muted">
                        Nur @stud.hwr-berlin.de-Adressen sind erlaubt.
                    </small>
                </div>

                <div class="mb-3">
                    <label for="first_name" class="form-label">
                        Vorname
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="first_name"
                        name="first_name"
                        autocomplete="given-name"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="last_name" class="form-label">
                        Nachname
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="last_name"
                        name="last_name"
                        autocomplete="family-name"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        Passwort
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label">
                        Passwort bestätigen
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        id="confirm_password"
                        name="confirm_password"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="btn btn-danger w-100 mb-3"
                >
                    Registrieren
                </button>
            </form>

            <p class="text-center mb-0">
                Bereits registriert?
                <a href="{{ url_for('login') }}">
                    Hier anmelden
                </a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
