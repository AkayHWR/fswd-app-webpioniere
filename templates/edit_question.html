{% extends "base.html" %}

{% block title %}
Frage bearbeiten
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="card-title mb-4">Frage bearbeiten</h2>

                {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endif %}

                <form method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label">Fragetitel</label>
                        <input type="text"
                               class="form-control"
                               id="title"
                               name="title"
                               value="{{ question.title }}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Beschreibung</label>
                        <textarea class="form-control"
                                  id="description"
                                  name="description"
                                  rows="6"
                                  required>{{ question.description }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="hashtags" class="form-label">Hashtags</label>
                        <input type="text"
                               class="form-control"
                               id="hashtags"
                               name="hashtags"
                               value="{{ question.hashtags }}"
                               required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Speichern</button>
                        <a href="{{ url_for('question_detail', question_id=question.id) }}"
                           class="btn btn-secondary">
                            Abbrechen
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
